<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeepSeek 多模态聊天</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DS聊天">
    <meta name="theme-color" content="#1a1d23">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --sidebar-bg: #1a1d23;
            --sidebar-text: #c9cdd4;
            --sidebar-heading: #8b8fa3;
            --sidebar-hover: #252830;
            --sidebar-active: #2a2d35;
            --sidebar-border: #2e3138;
            --accent: #6366f1;
            --accent-hover: #5558e6;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --chat-bg: #f5f6fa;
            --chat-user-bubble: #6366f1;
            --chat-user-text: #ffffff;
            --chat-ai-bubble: #ffffff;
            --chat-ai-text: #1a1d23;
            --chat-ai-border: #e8e9f0;
            --input-bg: #ffffff;
            --input-border: #dde0e8;
            --input-focus-border: #6366f1;
            --danger: #ef4444;
            --text-primary: #1a1d23;
            --text-secondary: #6b7084;
            --text-muted: #9ca0b0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
        }
        [data-theme="dark"] {
            --chat-bg: #1e1f26;
            --chat-ai-bubble: #2a2d35;
            --chat-ai-text: #e0e2e8;
            --chat-ai-border: #3a3d45;
            --input-bg: #2a2d35;
            --input-border: #3a3d45;
            --text-primary: #e0e2e8;
            --text-secondary: #a0a4b0;
            --text-muted: #6b7084;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: var(--font-sans); background: #f0f1f5; color: var(--text-primary); overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; max-width: 100%; }

        /* 侧边栏 */
        .sidebar { width: 360px; min-width: 360px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; height: 100%; border-right: 1px solid var(--sidebar-border); z-index: 10; transition: transform var(--transition); overflow: hidden; }
        .sidebar-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--sidebar-border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
        .sidebar-header .logo { display: flex; align-items: center; gap: 10px; font-size: 1.25rem; font-weight: 700; color: #fff; }
        .logo .icon-wrapper { width: 36px; height: 36px; border-radius: var(--radius-sm); background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .theme-toggle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--sidebar-border); background: transparent; color: var(--sidebar-text); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        .theme-toggle:hover { background: var(--sidebar-hover); color: #fff; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px 12px; }
        .sidebar-section { margin-bottom: 6px; border-radius: var(--radius-sm); overflow: hidden; background: transparent; }
        .sidebar-section.open { background: var(--sidebar-hover); }
        .section-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 11px 14px; background: transparent; border: none; color: var(--sidebar-heading); cursor: pointer; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .section-content { display: none; padding: 0 14px 12px; }
        .sidebar-section.open .section-content { display: block; }
        .sidebar input, .sidebar textarea, .sidebar select { width: 100%; padding: 9px 11px; border-radius: 6px; border: 1px solid var(--sidebar-border); background: #1e2027; color: #e0e2e8; font-size: 0.82rem; font-family: var(--font-sans); outline: none; margin-bottom: 6px; }
        .sidebar textarea { min-height: 60px; max-height: 140px; }
        .sidebar .btn-sm { display: inline-flex; align-items: center; gap: 4px; padding: 7px 13px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.76rem; font-weight: 500; background: var(--accent); color: #fff; width: 100%; justify-content: center; }
        .sidebar label { display: block; font-size: 0.72rem; font-weight: 500; color: var(--sidebar-heading); margin-bottom: 4px; }
        .sidebar .hint { font-size: 0.68rem; color: var(--text-muted); margin-top: 3px; }

        /* 智能体列表 */
        .agent-list-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 14px 8px; }
        .btn-add-agent { width: 26px; height: 26px; border-radius: 50%; border: 1.5px dashed #555; background: transparent; color: #999; cursor: pointer; font-size: 1rem; }
        .agent-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin: 2px 0; border-radius: var(--radius-sm); cursor: pointer; border: 1.5px solid transparent; }
        .agent-item.active { background: var(--sidebar-active); border-color: var(--accent); }
        .agent-avatar { width: 38px; height: 38px; border-radius: 50%; background: #2a2d35; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
        .agent-info { flex: 1; min-width: 0; }
        .agent-name { font-weight: 600; font-size: 0.88rem; color: #e0e2e8; }
        .agent-preview { font-size: 0.7rem; color: var(--text-muted); }

        /* 聊天区 */
        .chat-area { flex: 1; display: flex; flex-direction: column; height: 100%; background: var(--chat-bg); min-width: 0; }
        .chat-topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--chat-ai-bubble); border-bottom: 1px solid var(--chat-ai-border); flex-shrink: 0; gap: 12px; box-shadow: var(--shadow-sm); }
        .topbar-actions { display: flex; gap: 6px; }
        .btn-topbar { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: 20px; border: 1px solid var(--input-border); background: var(--input-bg); cursor: pointer; font-size: 0.78rem; color: var(--text-secondary); transition: var(--transition); white-space: nowrap; }
        .btn-topbar:disabled { opacity: 0.4; pointer-events: none; }
        .btn-topbar.danger-hover:hover { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }

        .messages-container { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
        .message { display: flex; gap: 10px; max-width: 80%; animation: msgIn 0.3s ease-out; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .message.user .msg-avatar { background: #dde0f0; }
        .message.assistant .msg-avatar { background: #e8e9f0; }
        .msg-bubble { padding: 11px 16px; border-radius: var(--radius-lg); font-size: 0.9rem; line-height: 1.6; word-break: break-word; position: relative; max-width: 100%; }
        .message.user .msg-bubble { background: var(--chat-user-bubble); color: var(--chat-user-text); border-bottom-right-radius: 6px; }
        .message.assistant .msg-bubble { background: var(--chat-ai-bubble); color: var(--chat-ai-text); border: 1px solid var(--chat-ai-border); box-shadow: var(--shadow-sm); border-bottom-left-radius: 6px; }
        .msg-bubble img { max-width: 100%; border-radius: 12px; margin: 8px 0; }
        .msg-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 3px; text-align: right; padding: 0 4px; }
        .message.user .msg-time { text-align: left; }
        .msg-actions { display: flex; gap: 4px; margin-top: 4px; opacity: 0; transition: opacity var(--transition); align-items: center; }
        .message.assistant:hover .msg-actions { opacity: 1; }
        .btn-copy, .btn-speak { font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-secondary); cursor: pointer; display: inline-flex; align-items: center; gap: 3px; }
        .btn-copy:hover, .btn-speak:hover { background: var(--chat-ai-border); color: var(--text-primary); }

        .branch-controls { display: flex; align-items: center; gap: 4px; margin-top: 4px; font-size: 0.75rem; color: var(--text-secondary); }
        .branch-btn { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 2px 8px; cursor: pointer; font-size: 0.7rem; color: var(--text-secondary); }
        .branch-btn:hover { background: var(--chat-ai-border); }
        .branch-btn:disabled { opacity: 0.3; cursor: default; }

        .input-area { padding: 14px 20px; background: var(--input-bg); border-top: 1px solid var(--input-border); display: flex; gap: 10px; align-items: flex-end; }
        .input-area textarea { flex: 1; padding: 11px 16px; border-radius: 24px; border: 1.5px solid var(--input-border); font-size: 0.88rem; font-family: var(--font-sans); resize: none; outline: none; background: var(--chat-bg); color: var(--text-primary); max-height: 140px; min-height: 44px; }
        .input-area textarea:focus { border-color: var(--input-focus-border); box-shadow: 0 0 0 4px rgba(99,102,241,0.08); }
        .btn-send { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 1.1rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px var(--accent-glow); }
        .btn-send:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-send:disabled { background: #c5c8d8; cursor: not-allowed; box-shadow: none; transform: none; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal { background: var(--chat-ai-bubble); border-radius: var(--radius-lg); padding: 24px; width: 500px; max-width: 92vw; box-shadow: var(--shadow-lg); color: var(--text-primary); }
        .modal h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
        .modal label { display: block; font-weight: 600; font-size: 0.8rem; margin-bottom: 4px; color: var(--text-secondary); }
        .modal input, .modal textarea, .modal select { width: 100%; padding: 10px 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--input-border); font-size: 0.85rem; font-family: var(--font-sans); outline: none; margin-bottom: 12px; background: var(--input-bg); color: var(--text-primary); }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
        .btn-primary { background: var(--accent); color: #fff; padding: 9px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; }
        .btn-cancel { background: #f3f4f6; color: #555; padding: 9px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1d23; color: #fff; padding: 10px 22px; border-radius: 24px; font-size: 0.82rem; z-index: 200; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease-out; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        .loading-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
        .loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: #b0b5c8; animation: dotPulse 1.4s infinite ease-in-out; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

        .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-align: center; padding: 40px; }
        .empty-chat .big-icon { font-size: 4rem; opacity: 0.5; margin-bottom: 8px; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); width: 300px; min-width: 300px; z-index: 50; }
            .sidebar.open { transform: translateX(0); }
            .mobile-menu-btn { display: flex !important; }
            .message { max-width: 92%; }
            .topbar-actions { flex-wrap: wrap; }
        }
        .mobile-menu-btn { display: none; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--input-border); background: var(--input-bg); cursor: pointer; font-size: 1rem; align-items: center; justify-content: center; }

        .msg-bubble pre code.hljs { padding: 14px; border-radius: 8px; font-size: 0.8rem; }
        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 10px 0 6px; }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble ul, .msg-bubble ol { margin: 8px 0; padding-left: 20px; }
        .msg-bubble table { border-collapse: collapse; margin: 10px 0; width: 100%; }
        .msg-bubble th, .msg-bubble td { border: 1px solid var(--chat-ai-border); padding: 6px 10px; }
        .msg-bubble th { background: var(--chat-ai-border); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><div class="icon-wrapper">🤖</div><span>DeepSeek 聊天</span></div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
            </div>
            <div class="sidebar-scroll">
                <div class="sidebar-section open" id="sectionApi">
                    <button class="section-toggle" onclick="toggleSection('sectionApi')">🔑 API 密钥</button>
                    <div class="section-content">
                        <label>DeepSeek API Key</label>
                        <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
                        <button class="btn-sm" onclick="saveApiKey()" style="margin-top:6px;">💾 保存密钥</button>
                        <p class="hint">图像生成使用免费API，无需额外密钥</p>
                    </div>
                </div>

                <div class="sidebar-section open" id="sectionGlobal">
                    <button class="section-toggle" onclick="toggleSection('sectionGlobal')">🌐 底层提示词</button>
                    <div class="section-content">
                        <textarea id="globalPromptInput" placeholder="适用于所有智能体的全局提示词..."></textarea>
                        <button class="btn-sm" onclick="saveGlobalPrompt()" style="margin-top:6px;">💾 保存全局提示词</button>
                    </div>
                </div>

                <div class="sidebar-section open" id="sectionParams">
                    <button class="section-toggle" onclick="toggleSection('sectionParams')">⚙️ 模型参数</button>
                    <div class="section-content">
                        <label>Temperature (0-2)</label>
                        <input type="range" id="temperatureSlider" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('tempValue').textContent = this.value">
                        <span id="tempValue">0.7</span>
                        <label>最大 Token</label>
                        <select id="maxTokensSelect">
                            <option value="1024">1024</option>
                            <option value="2048" selected>2048</option>
                            <option value="4096">4096</option>
                            <option value="8192">8192</option>
                        </select>
                        <label style="margin-top:8px;">语音朗读</label>
                        <select id="autoSpeakSelect">
                            <option value="off">关闭</option>
                            <option value="on">自动朗读AI回复</option>
                        </select>
                    </div>
                </div>

                <div class="agent-list-header">
                    <span>🤖 我的智能体</span>
                    <button class="btn-add-agent" onclick="openCreateAgentModal()">+</button>
                </div>
                <input type="text" class="agent-search" id="agentSearchInput" placeholder="搜索智能体..." oninput="filterAgents()" style="margin:6px 14px;width:calc(100% - 28px);padding:8px 12px;border-radius:8px;border:1px solid var(--sidebar-border);background:#1e2027;color:#e0e2e8;">
                <div id="agentList"></div>
            </div>
        </aside>

        <!-- 聊天区 -->
        <main class="chat-area">
            <div class="chat-topbar">
                <div style="display:flex;align-items:center;gap:8px;">
                    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>
                    <div id="currentAgentInfo">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="width:40px;height:40px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">🤖</div>
                            <div>
                                <div style="font-weight:700;">选择智能体</div>
                                <div style="font-size:0.72rem;color:var(--text-secondary);">创建或选择智能体</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="btn-topbar" onclick="exportChat()">📥 导出</button>
                    <button class="btn-topbar" id="btnRegenerate" onclick="regenerate()" disabled>🔄 重新生成</button>
                    <button class="btn-topbar danger-hover" id="btnRestart" onclick="restartChat()" disabled>🗑️ 重启</button>
                    <button class="btn-topbar" id="btnUndo" onclick="undoMessage()" disabled>↩️ 撤回</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-chat" id="emptyChat">
                    <div class="big-icon">💬</div>
                    <h3>开始对话</h3>
                    <p>输入 /image 开头可以生成图像，例如：/image 一只赛博朋克猫</p>
                </div>
            </div>
            <div class="input-area">
                <textarea id="userInput" rows="1" placeholder="输入消息... (/image 描述 可生图)"></textarea>
                <button class="btn-send" id="btnSend" onclick="sendMessage()">➤</button>
            </div>
        </main>
    </div>

    <!-- 智能体编辑模态框 -->
    <div class="modal-overlay" id="agentModal" style="display:none;">
        <div class="modal">
            <h3 id="modalTitle">创建智能体</h3>
            <p class="subtitle" style="font-size:0.78rem;color:var(--text-muted);margin-bottom:12px;">设置智能体的名称、模型和人设</p>
            <label>名称</label>
            <input type="text" id="modalAgentName" placeholder="例如：翻译专家">
            <label>头像 Emoji</label>
            <input type="text" id="modalAgentAvatar" placeholder="🤖" maxlength="4" style="width:70px;text-align:center;font-size:1.5rem;">
            <label>使用的模型</label>
            <select id="modalAgentModel">
                <option value="deepseek-chat">DeepSeek Chat</option>
                <option value="deepseek-reasoner">DeepSeek Reasoner</option>
            </select>
            <label>人设提示词</label>
            <textarea id="modalAgentPrompt" placeholder="描述该智能体的人设..."></textarea>
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeAgentModal()">取消</button>
                <button class="btn-primary" id="modalSaveBtn" onclick="saveAgent()">保存</button>
            </div>
        </div>
    </div>
    <div id="mobileOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:45;" onclick="closeMobileSidebar()"></div>

    <script>
        // 初始化 Marked 和 Highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            breaks: true,
            gfm: true
        });

        // ==================== 数据管理 ====================
        const STORAGE_KEY = 'deepseek_image_voice_v2';

        function getDefaultData() {
            return {
                apiKey: '',
                globalPrompt: '',
                theme: 'light',
                temperature: 0.7,
                maxTokens: 2048,
                autoSpeak: 'off',
                agents: [
                    { id: 'agent_default', name: '通用助手', avatar: '🤖', personaPrompt: '你是一个乐于助人的AI助手。', modelId: 'deepseek-chat' }
                ],
                chatTrees: {
                    'agent_default': { root: createNode('root', 'root'), currentPath: [] }
                },
                currentAgentId: 'agent_default'
            };
        }

        function createNode(role, content, timestamp = null) {
            return {
                id: 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                role,
                content,
                timestamp: timestamp || Date.now(),
                children: []
            };
        }

        let appData = loadData();
        let editingAgentId = null;
        let isLoading = false;
        let abortController = null;
        let currentStreamContent = '';
        let currentModelId = 'deepseek-chat';

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    const def = getDefaultData();
                    for (const k of Object.keys(def)) {
                        if (!(k in data)) data[k] = def[k];
                    }
                    if (!data.agents || data.agents.length === 0) data.agents = def.agents;
                    if (!data.chatTrees) data.chatTrees = {};
                    data.agents.forEach(a => {
                        if (!a.modelId) a.modelId = 'deepseek-chat';
                        if (!data.chatTrees[a.id]) {
                            data.chatTrees[a.id] = { root: createNode('root', 'root'), currentPath: [] };
                        }
                    });
                    return data;
                }
            } catch (e) {
                console.error('数据加载失败:', e);
            }
            return getDefaultData();
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            } catch (e) {
                showToast('⚠️ 存储空间不足');
            }
        }

        // ==================== 辅助函数 ====================
        function getCurrentHistory() {
            const tree = appData.chatTrees[appData.currentAgentId];
            if (!tree) return [];
            const path = tree.currentPath;
            const history = [];
            let node = tree.root;
            for (const id of path) {
                const child = node.children.find(c => c.id === id);
                if (!child) break;
                history.push(child);
                node = child;
            }
            return history;
        }

        function getCurrentAgent() {
            return appData.agents.find(a => a.id === appData.currentAgentId);
        }

        function renderAgentList(filterText = '') {
            const list = document.getElementById('agentList');
            if (!list) return;
            list.innerHTML = '';
            const filtered = appData.agents.filter(a => a.name.toLowerCase().includes((filterText || '').toLowerCase()));
            filtered.forEach(agent => {
                const isActive = agent.id === appData.currentAgentId;
                const div = document.createElement('div');
                div.className = 'agent-item' + (isActive ? ' active' : '');
                const modelName = agent.modelId === 'deepseek-chat' ? 'DS Chat' : 'DS Reasoner';
                div.innerHTML = `
                    <div class="agent-avatar">${escapeHtml(agent.avatar || '🤖')}</div>
                    <div class="agent-info">
                        <div class="agent-name">${escapeHtml(agent.name)} <span style="background:var(--accent);color:#fff;font-size:0.65rem;padding:2px 6px;border-radius:8px;">${modelName}</span></div>
                        <div class="agent-preview">${escapeHtml(agent.personaPrompt || '无描述')}</div>
                    </div>
                    <div class="agent-actions" style="display:flex;gap:4px;">
                        <button onclick="event.stopPropagation();openEditAgentModal('${agent.id}')" style="background:transparent;border:none;color:var(--sidebar-text);cursor:pointer;">✎</button>
                        <button onclick="event.stopPropagation();deleteAgent('${agent.id}')" style="background:transparent;border:none;color:var(--danger);cursor:pointer;">×</button>
                    </div>
                `;
                div.addEventListener('click', () => selectAgent(agent.id, true));
                list.appendChild(div);
            });
        }

        function selectAgent(agentId, save = true) {
            if (isLoading && appData.currentAgentId !== agentId) {
                if (abortController) {
                    abortController.abort();
                    abortController = null;
                }
                isLoading = false;
            }
            appData.currentAgentId = agentId;
            const agent = getCurrentAgent();
            currentModelId = agent?.modelId || 'deepseek-chat';
            if (save !== false) saveData();
            renderAgentList(document.getElementById('agentSearchInput')?.value || '');
            renderMessages();
            updateTopbarInfo();
            updateButtons();
            updateInputState();
            scrollToBottom();
        }

        function updateTopbarInfo() {
            const agent = getCurrentAgent();
            const container = document.getElementById('currentAgentInfo');
            if (!container) return;
            if (agent) {
                container.innerHTML = `
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:40px;height:40px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">${escapeHtml(agent.avatar || '🤖')}</div>
                        <div>
                            <div style="font-weight:700;">${escapeHtml(agent.name)}</div>
                            <div style="font-size:0.72rem;color:var(--text-secondary);">${escapeHtml(agent.personaPrompt || '')}</div>
                            <div class="current-agent-model" style="font-size:0.7rem;color:var(--accent);">🧠 ${agent.modelId === 'deepseek-reasoner' ? 'DeepSeek Reasoner' : 'DeepSeek Chat'}</div>
                        </div>
                    </div>`;
            }
        }

        function updateButtons() {
            const history = getCurrentHistory();
            const has = history.length > 0;
            document.getElementById('btnRegenerate').disabled = !has || isLoading;
            document.getElementById('btnRestart').disabled = !has || isLoading;
            document.getElementById('btnUndo').disabled = !has || isLoading;
        }

        function updateInputState() {
            const hasKey = !!appData.apiKey;
            const hasAgent = !!getCurrentAgent();
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('btnSend');
            input.disabled = !hasKey || !hasAgent || isLoading;
            sendBtn.disabled = !hasKey || !hasAgent || isLoading || !input.value.trim();
            if (!hasKey && hasAgent) {
                input.placeholder = '请先配置 API 密钥...';
            } else if (!hasAgent) {
                input.placeholder = '请先选择智能体...';
            } else if (isLoading) {
                input.placeholder = 'AI 正在回复...';
            } else {
                input.placeholder = '输入消息... (/image 描述 可生图)';
            }
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const empty = document.getElementById('emptyChat');
            const history = getCurrentHistory();
            container.innerHTML = '';
            if (history.length === 0) {
                empty.style.display = 'flex';
                container.appendChild(empty);
            } else {
                empty.style.display = 'none';
                const tree = appData.chatTrees[appData.currentAgentId];
                let node = tree.root;
                const path = tree.currentPath;
                for (let i = 0; i < path.length; i++) {
                    const childId = path[i];
                    const child = node.children.find(c => c.id === childId);
                    if (!child) break;
                    const div = document.createElement('div');
                    div.className = 'message ' + child.role;
                    const agent = getCurrentAgent();
                    const avatar = child.role === 'user' ? '👤' : (agent?.avatar || '🤖');
                    const contentHtml = child.role === 'assistant' ? marked.parse(child.content) : escapeHtml(child.content).replace(/\n/g, '<br>');
                    div.innerHTML = `
                        <div class="msg-avatar">${avatar}</div>
                        <div style="max-width:100%;">
                            <div class="msg-bubble">${contentHtml}</div>
                            ${child.role === 'assistant' ? `
                            <div class="msg-actions">
                                <button class="btn-copy" onclick="copyMessage(this)">📋 复制</button>
                                <button class="btn-speak" onclick="speakMessage(this)">🔊 朗读</button>
                            </div>` : ''}
                            ${child.role === 'assistant' ? renderBranchControls(node, child, i) : ''}
                            <div class="msg-time">${child.timestamp ? formatTime(child.timestamp) : ''}</div>
                        </div>`;
                    div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                    container.appendChild(div);
                    node = child;
                }
            }
            scrollToBottom();
        }

        function renderBranchControls(parentNode, currentNode, pathIndex) {
            const siblings = parentNode.children.filter(c => c.role === 'assistant');
            if (siblings.length <= 1) return '';
            const currentIdx = siblings.findIndex(c => c.id === currentNode.id);
            return `
                <div class="branch-controls">
                    <button class="branch-btn" ${currentIdx === 0 ? 'disabled' : ''} onclick="switchBranch(${pathIndex}, ${currentIdx - 1})">←</button>
                    <span>分支 ${currentIdx + 1}/${siblings.length}</span>
                    <button class="branch-btn" ${currentIdx === siblings.length - 1 ? 'disabled' : ''} onclick="switchBranch(${pathIndex}, ${currentIdx + 1})">→</button>
                    <button class="branch-btn" onclick="forkBranch(${pathIndex})">🌿 分叉</button>
                </div>`;
        }

        window.switchBranch = function(pathIndex, newSiblingIdx) {
            const tree = appData.chatTrees[appData.currentAgentId];
            const path = tree.currentPath;
            if (pathIndex >= path.length) return;
            let node = tree.root;
            for (let i = 0; i < pathIndex; i++) {
                node = node.children.find(c => c.id === path[i]);
                if (!node) return;
            }
            const siblings = node.children.filter(c => c.role === 'assistant');
            if (newSiblingIdx < 0 || newSiblingIdx >= siblings.length) return;
            path[pathIndex] = siblings[newSiblingIdx].id;
            path.splice(pathIndex + 1);
            saveData();
            renderMessages();
            updateButtons();
            scrollToBottom();
        };

        window.forkBranch = async function(pathIndex) {
            if (isLoading) return;
            const tree = appData.chatTrees[appData.currentAgentId];
            const path = tree.currentPath;
            let node = tree.root;
            for (let i = 0; i <= pathIndex; i++) {
                const child = node.children.find(c => c.id === path[i]);
                if (!child) return;
                node = child;
            }
            if (node.role !== 'user') return;
            await generateNewBranch(node);
        };

        window.copyMessage = function(btn) {
            const messageDiv = btn.closest('.message');
            if (!messageDiv) {
                showToast('❌ 未找到消息元素');
                return;
            }
            const bubble = messageDiv.querySelector('.msg-bubble');
            if (!bubble) {
                showToast('❌ 未找到内容');
                return;
            }
            const text = bubble.textContent.trim();
            if (!text) {
                showToast('⚠️ 没有可复制的文字');
                return;
            }

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        btn.textContent = '✅ 已复制';
                        setTimeout(() => { btn.textContent = '📋 复制'; }, 1500);
                    })
                    .catch(() => {
                        fallbackCopy(text, btn);
                    });
            } else {
                fallbackCopy(text, btn);
            }
        };

        function fallbackCopy(text, btn) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                btn.textContent = '✅ 已复制';
                setTimeout(() => { btn.textContent = '📋 复制'; }, 1500);
            } catch (err) {
                showToast('❌ 复制失败，请手动复制');
            }
            document.body.removeChild(textarea);
        }

        window.speakMessage = function(btn) {
            const messageDiv = btn.closest('.message');
            if (!messageDiv) return;
            const bubble = messageDiv.querySelector('.msg-bubble');
            if (!bubble) return;
            const text = bubble.textContent.trim();
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.1;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        };

        function formatTime(timestamp) {
            const d = new Date(timestamp);
            const now = new Date();
            const hm = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            if (d.toDateString() === now.toDateString()) return hm;
            return `${d.getMonth() + 1}/${d.getDate()} ${hm}`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            });
        }

        // ==================== 图像生成 ====================
        async function generateImage(prompt) {
            // 1. 使用 DeepSeek 优化提示词
            const optimizePrompt = `Convert the following user description into a high-quality English AI image generation prompt. Return only the prompt itself, no explanations: ${prompt}`;
            const messages = [
                { role: 'system', content: 'You are a helpful assistant that converts short descriptions into high-quality English image generation prompts. Return ONLY the prompt.' },
                { role: 'user', content: optimizePrompt }
            ];
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${appData.apiKey}` },
                body: JSON.stringify({ model: 'deepseek-chat', messages, temperature: 0.7, max_tokens: 200 })
            });
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || '优化提示词失败');
            }
            const data = await response.json();
            const optimizedPrompt = data.choices[0].message.content.trim();
            
            // 2. 调用 Pollinations.ai 免费生成图像
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(optimizedPrompt)}?width=1024&height=1024&nologo=true`;
            return { url: imageUrl, optimized: optimizedPrompt };
        }

        // ==================== DeepSeek API 流式调用 ====================
        async function generateNewBranch(userNode) {
            const history = getCurrentHistory();
            if (history.length === 0) return;
            const agent = getCurrentAgent();
            if (!agent) return;
            if (!appData.apiKey) {
                showToast('请先配置 API 密钥');
                return;
            }

            isLoading = true;
            updateInputState();
            updateButtons();

            const systemParts = [appData.globalPrompt?.trim(), agent.personaPrompt?.trim()].filter(Boolean);
            const systemMessage = systemParts.join('\n\n') || 'You are a helpful assistant.';

            // 构建到当前用户节点为止的线性消息
            const messages = [{ role: 'system', content: systemMessage }];
            let node = appData.chatTrees[appData.currentAgentId].root;
            const path = appData.chatTrees[appData.currentAgentId].currentPath;
            for (const id of path) {
                const child = node.children.find(c => c.id === id);
                if (!child) break;
                messages.push({ role: child.role, content: child.content });
                node = child;
                if (node.id === userNode.id) break;
            }

            abortController = new AbortController();
            currentStreamContent = '';

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${appData.apiKey}` },
                    body: JSON.stringify({
                        model: currentModelId,
                        messages,
                        temperature: appData.temperature || 0.7,
                        max_tokens: appData.maxTokens || 2048,
                        stream: true
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                }

                const newAssistNode = createNode('assistant', '', Date.now());
                userNode.children.push(newAssistNode);
                const idx = path.findIndex(id => id === userNode.id);
                if (idx !== -1) {
                    path.splice(idx + 1);
                }
                path.push(newAssistNode.id);
                saveData();
                renderMessages();
                const bubble = document.querySelector('.message.assistant:last-child .msg-bubble');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
                    for (const line of lines) {
                        const json = line.replace('data: ', '').trim();
                        if (json === '[DONE]') continue;
                        try {
                            const delta = JSON.parse(json).choices?.[0]?.delta?.content;
                            if (delta) {
                                currentStreamContent += delta;
                                newAssistNode.content = currentStreamContent;
                                if (bubble) {
                                    bubble.innerHTML = marked.parse(currentStreamContent);
                                    bubble.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                                }
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
                saveData();
                // 自动朗读
                if (appData.autoSpeak === 'on') {
                    const textToSpeak = currentStreamContent.replace(/!\[.*?\]\(.*?\)/g, '').replace(/[*>`#]/g, '');
                    const utterance = new SpeechSynthesisUtterance(textToSpeak);
                    utterance.lang = 'zh-CN';
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                }

            } catch (err) {
                if (err.name !== 'AbortError') {
                    // 移除已添加的空节点
                    const idx = userNode.children.findIndex(c => c.id && c.content === '' && c.role === 'assistant');
                    if (idx !== -1) userNode.children.splice(idx, 1);
                    const path = appData.chatTrees[appData.currentAgentId].currentPath;
                    const pos = path.indexOf(newAssistNode?.id);
                    if (pos !== -1) path.splice(pos);
                    saveData();
                    renderMessages();
                    showToast('请求失败: ' + err.message);
                }
            } finally {
                isLoading = false;
                abortController = null;
                updateInputState();
                updateButtons();
            }
        }

        // ==================== 消息操作 ====================
        window.sendMessage = async function() {
            if (isLoading) return;
            const content = document.getElementById('userInput').value.trim();
            const agent = getCurrentAgent();
            if (!content || !appData.apiKey || !agent) return;
            
            // 图像生成命令
            if (content.startsWith('/image')) {
                const prompt = content.replace('/image', '').trim();
                if (!prompt) {
                    showToast('请提供图像描述，例如：/image 一只猫');
                    return;
                }
                
                const tree = appData.chatTrees[appData.currentAgentId];
                const userNode = createNode('user', content);
                let parentNode = tree.root;
                const path = tree.currentPath;
                for (const id of path) {
                    const child = parentNode.children.find(c => c.id === id);
                    if (!child) break;
                    parentNode = child;
                }
                parentNode.children.push(userNode);
                path.push(userNode.id);
                document.getElementById('userInput').value = '';
                document.getElementById('userInput').style.height = 'auto';
                saveData();
                renderMessages();
                updateButtons();
                scrollToBottom();
                
                isLoading = true;
                updateInputState();
                updateButtons();
                
                try {
                    const { url, optimized } = await generateImage(prompt);
                    const assistContent = `🎨 根据你的描述生成的图像：\n\n![${escapeHtml(prompt)}](${url})\n\n> 优化后的提示词：${escapeHtml(optimized)}`;
                    const assistNode = createNode('assistant', assistContent);
                    userNode.children.push(assistNode);
                    path.push(assistNode.id);
                    saveData();
                    renderMessages();
                    if (appData.autoSpeak === 'on') {
                        const textToSpeak = `已根据你的描述生成图像，提示词为：${optimized}`;
                        const utterance = new SpeechSynthesisUtterance(textToSpeak);
                        utterance.lang = 'zh-CN';
                        window.speechSynthesis.cancel();
                        window.speechSynthesis.speak(utterance);
                    }
                } catch (err) {
                    const errorContent = `❌ 图像生成失败：${err.message}`;
                    const assistNode = createNode('assistant', errorContent);
                    userNode.children.push(assistNode);
                    path.push(assistNode.id);
                    saveData();
                    renderMessages();
                    showToast('图像生成失败: ' + err.message);
                } finally {
                    isLoading = false;
                    updateInputState();
                    updateButtons();
                }
                return;
            }

            // 普通文本消息
            const tree = appData.chatTrees[appData.currentAgentId];
            const newUserNode = createNode('user', content);
            let parentNode = tree.root;
            const path = tree.currentPath;
            for (const id of path) {
                const child = parentNode.children.find(c => c.id === id);
                if (!child) break;
                parentNode = child;
            }
            parentNode.children.push(newUserNode);
            path.push(newUserNode.id);
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').style.height = 'auto';
            saveData();
            renderMessages();
            updateButtons();
            scrollToBottom();
            await generateNewBranch(newUserNode);
        };

        window.regenerate = async function() {
            if (isLoading) return;
            const history = getCurrentHistory();
            if (history.length < 2) return;
            const lastAI = history[history.length - 1];
            if (lastAI.role !== 'assistant') return;
            const userNode = history[history.length - 2];
            const idx = userNode.children.findIndex(c => c.id === lastAI.id);
            if (idx !== -1) userNode.children.splice(idx, 1);
            const path = appData.chatTrees[appData.currentAgentId].currentPath;
            if (path[path.length - 1] === lastAI.id) path.pop();
            saveData();
            renderMessages();
            await generateNewBranch(userNode);
        };

        window.undoMessage = function() {
            if (isLoading) return;
            const history = getCurrentHistory();
            if (history.length === 0) return;
            const tree = appData.chatTrees[appData.currentAgentId];
            const path = tree.currentPath;
            const last = history[history.length - 1];
            if (last.role === 'assistant') {
                const userNode = history[history.length - 2];
                const idx = userNode.children.findIndex(c => c.id === last.id);
                if (idx !== -1) userNode.children.splice(idx, 1);
                path.pop();
            } else if (last.role === 'user') {
                const parentNode = history.length > 1 ? history[history.length - 2] : tree.root;
                const idx = parentNode.children.findIndex(c => c.id === last.id);
                if (idx !== -1) parentNode.children.splice(idx, 1);
                path.pop();
            }
            saveData();
            renderMessages();
            updateButtons();
            showToast('↩️ 已撤回');
        };

        window.restartChat = function() {
            if (isLoading || getCurrentHistory().length === 0) return;
            if (!confirm('确定要删除当前智能体的所有对话记录吗？')) return;
            appData.chatTrees[appData.currentAgentId] = { root: createNode('root', 'root'), currentPath: [] };
            saveData();
            renderMessages();
            updateButtons();
            updateInputState();
            showToast('🗑️ 对话已重启');
        };

        window.exportChat = function() {
            const history = getCurrentHistory();
            if (history.length === 0) {
                showToast('没有对话可导出');
                return;
            }
            const agent = getCurrentAgent();
            let md = `# 与 ${agent?.name || '智能体'} 的对话\n\n`;
            history.forEach(msg => {
                const role = msg.role === 'user' ? '🧑 你' : `🤖 ${agent?.name || 'AI'}`;
                md += `**${role}** (${msg.timestamp ? new Date(msg.timestamp).toLocaleString() : ''})\n\n${msg.content}\n\n---\n\n`;
            });
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_${agent?.name || 'export'}_${new Date().toISOString().slice(0, 10)}.md`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 对话已导出');
        };

            showToast('✅ 全局提示词已保存');

        window.filterAgents = function() {

        // ==================== 智能体 CRUD ====================
        window.openCreateAgentModal = function() {
            editingAgentId = null;
            document.getElementById('modalTitle').textContent = '创建智能体';
            document.getElementById('modalAgentName').value = '';
            document.getElementById('modalAgentAvatar').value = '🤖';
            document.getElementById('modalAgentModel').value = 'deepseek-chat';
            document.getElementById('modalAgentPrompt').value = '';
            document.getElementById('agentModal').style.display = 'flex';
        };

        window.openEditAgentModal = function(agentId) {
            const agent = appData.agents.find(a => a.id === agentId);
            if (!agent) return;
            editingAgentId = agentId;
            document.getElementById('modalTitle').textContent = '编辑智能体';
            document.getElementById('modalAgentName').value = agent.name;
            document.getElementById('modalAgentAvatar').value = agent.avatar || '🤖';
            document.getElementById('modalAgentModel').value = agent.modelId || 'deepseek-chat';
            document.getElementById('modalAgentPrompt').value = agent.personaPrompt || '';
            document.getElementById('agentModal').style.display = 'flex';
        };

        window.closeAgentModal = function() {
            document.getElementById('agentModal').style.display = 'none';
            editingAgentId = null;
        };

        window.saveAgent = function() {
            const name = document.getElementById('modalAgentName').value.trim();
            const avatar = document.getElementById('modalAgentAvatar').value.trim() || '🤖';
            const modelId = document.getElementById('modalAgentModel').value;
            const prompt = document.getElementById('modalAgentPrompt').value.trim();
            if (!name) {
                showToast('⚠️ 请输入名称');
                return;
            }

            if (editingAgentId) {
                const agent = appData.agents.find(a => a.id === editingAgentId);
                if (agent) {
                    agent.name = name;
                    agent.avatar = avatar;
                    agent.modelId = modelId;
                    agent.personaPrompt = prompt;
                }
            } else {
                const newAgent = {
                    id: 'agent_' + Date.now(),
                    name,
                    avatar,
                    modelId,
                    personaPrompt: prompt,
                    createdAt: Date.now()
                };
                appData.agents.push(newAgent);
                appData.chatTrees[newAgent.id] = { root: createNode('root', 'root'), currentPath: [] };
                appData.currentAgentId = newAgent.id;
            }

            saveData();
            renderAgentList();
            selectAgent(appData.currentAgentId, false);
            updateTopbarInfo();
            updateInputState();
            document.getElementById('agentModal').style.display = 'none';
            editingAgentId = null;
            showToast(editingAgentId ? '✅ 智能体已更新' : '🎉 智能体已创建');
        };

        window.deleteAgent = function(agentId) {
            if (appData.agents.length <= 1) {
                showToast('⚠️ 至少保留一个智能体');
                return;
            }
            const agent = appData.agents.find(a => a.id === agentId);
            if (!agent) return;
            if (!confirm(`确定要删除智能体"${agent.name}"吗？`)) return;

            appData.agents = appData.agents.filter(a => a.id !== agentId);
            delete appData.chatTrees[agentId];

            if (appData.currentAgentId === agentId) {
                appData.currentAgentId = appData.agents[0].id;
            }

            saveData();
            renderAgentList();
            selectAgent(appData.currentAgentId, false);
            updateTopbarInfo();
            updateInputState();
            showToast('🗑️ 智能体已删除');
        };

        // ==================== 移动端侧边栏 ====================
        window.toggleMobileSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            document.getElementById('mobileOverlay').style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        };

        window.closeMobileSidebar = function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('mobileOverlay').style.display = 'none';
        };

        // ==================== Toast ====================
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 2600);
        }

        // ==================== 事件监听 ====================
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!document.getElementById('btnSend').disabled) {
                    sendMessage();
                }
            }
        });

        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 140) + 'px';
            updateInputState();
        });

        document.getElementById('temperatureSlider').addEventListener('change', function() {
            appData.temperature = parseFloat(this.value);
            saveData();
        });

        document.getElementById('maxTokensSelect').addEventListener('change', function() {
            appData.maxTokens = parseInt(this.value);
            saveData();
        });

        document.getElementById('autoSpeakSelect').addEventListener('change', function() {
            appData.autoSpeak = this.value;
            saveData();
        });

        document.getElementById('agentModal').addEventListener('click', function(e) {
            if (e.target === this) closeAgentModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('agentModal').style.display === 'flex') {
                    closeAgentModal();
                } else if (document.getElementById('sidebar').classList.contains('open')) {
                    closeMobileSidebar();
                }
            }
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                closeMobileSidebar();
            }
        });

        // ==================== 初始化 ====================
        (function init() {
            document.getElementById('apiKeyInput').value = appData.apiKey || '';
            document.getElementById('globalPromptInput').value = appData.globalPrompt || '';
            document.getElementById('temperatureSlider').value = appData.temperature;
            document.getElementById('maxTokensSelect').value = appData.maxTokens;
            document.getElementById('autoSpeakSelect').value = appData.autoSpeak || 'off';
            document.documentElement.setAttribute('data-theme', appData.theme);
            document.getElementById('themeToggle').textContent = appData.theme === 'dark' ? '☀️' : '🌙';
            renderAgentList();
            selectAgent(appData.currentAgentId, false);
            updateTopbarInfo();
            updateInputState();
            const history = getCurrentHistory();
            if (history.length === 0) {
                document.getElementById('emptyChat').style.display = 'flex';
            } else {
                document.getElementById('emptyChat').style.display = 'none';
            }
            console.log('🤖 DeepSeek 多模态聊天平台已就绪');
        })();
    </script>
</body>
</html>
