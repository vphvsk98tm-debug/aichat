<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 聊天平台 Pro - DeepSeek</title>
    
    <!-- iOS 主屏幕书签支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI聊天Pro">
    <meta name="theme-color" content="#1a1d23">

    <!-- 外部库：Markdown 渲染 + 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --sidebar-bg: #1a1d23;
            --sidebar-text: #c9cdd4;
            --sidebar-heading: #8b8fa3;
            --sidebar-hover: #252830;
            --sidebar-active: #2a2d35;
            --sidebar-border: #2e3138;
            --accent: #6366f1;
            --accent-hover: #5558e6;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --chat-bg: #f5f6fa;
            --chat-user-bubble: #6366f1;
            --chat-user-text: #ffffff;
            --chat-ai-bubble: #ffffff;
            --chat-ai-text: #1a1d23;
            --chat-ai-border: #e8e9f0;
            --input-bg: #ffffff;
            --input-border: #dde0e8;
            --input-focus-border: #6366f1;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-primary: #1a1d23;
            --text-secondary: #6b7084;
            --text-muted: #9ca0b0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* 深色主题变量 */
        [data-theme="dark"] {
            --chat-bg: #1e1f26;
            --chat-ai-bubble: #2a2d35;
            --chat-ai-text: #e0e2e8;
            --chat-ai-border: #3a3d45;
            --input-bg: #2a2d35;
            --input-border: #3a3d45;
            --text-primary: #e0e2e8;
            --text-secondary: #a0a4b0;
            --text-muted: #6b7084;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
            --chat-user-bubble: #818cf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            background: #f0f1f5;
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            max-width: 100%;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 340px;
            min-width: 340px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            height: 100%;
            border-right: 1px solid var(--sidebar-border);
            z-index: 10;
            transition: transform var(--transition);
            overflow: hidden;
        }
        .sidebar-header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--sidebar-border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
        }
        .logo .icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--sidebar-border);
            background: transparent;
            color: var(--sidebar-text);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .theme-toggle:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 12px;
        }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #3a3d45; border-radius: 4px; }

        /* 搜索框 */
        .agent-search {
            margin: 6px 14px 8px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--sidebar-border);
            background: #1e2027;
            color: #e0e2e8;
            font-size: 0.8rem;
            outline: none;
            width: calc(100% - 28px);
            transition: border-color var(--transition);
        }
        .agent-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .sidebar-section {
            margin-bottom: 6px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: transparent;
            transition: background var(--transition);
        }
        .sidebar-section.open { background: var(--sidebar-hover); }
        .section-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 11px 14px;
            background: transparent;
            border: none;
            color: var(--sidebar-heading);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            transition: color var(--transition);
            gap: 8px;
            font-family: var(--font-sans);
        }
        .section-toggle:hover { color: #e0e2e8; }
        .section-toggle .arrow {
            transition: transform var(--transition);
            font-size: 0.65rem;
            opacity: 0.7;
        }
        .sidebar-section.open .section-toggle .arrow { transform: rotate(90deg); }
        .section-content { display: none; padding: 0 14px 12px; }
        .sidebar-section.open .section-content { display: block; }

        .sidebar label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--sidebar-heading);
            margin-bottom: 4px;
        }
        .sidebar input[type="text"],
        .sidebar input[type="password"],
        .sidebar textarea,
        .sidebar select {
            width: 100%;
            padding: 9px 11px;
            border-radius: 6px;
            border: 1px solid var(--sidebar-border);
            background: #1e2027;
            color: #e0e2e8;
            font-size: 0.82rem;
            font-family: var(--font-sans);
            resize: vertical;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }
        .sidebar input:focus,
        .sidebar textarea:focus,
        .sidebar select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .sidebar textarea { min-height: 60px; max-height: 140px; font-size: 0.78rem; line-height: 1.5; }
        .sidebar .hint { font-size: 0.68rem; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
        .sidebar .btn-sm {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 7px 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.76rem;
            font-weight: 500;
            transition: all var(--transition);
            font-family: var(--font-sans);
        }
        .btn-accent-sm { background: var(--accent); color: #fff; }
        .btn-accent-sm:hover { background: var(--accent-hover); box-shadow: 0 2px 8px var(--accent-glow); }

        /* 智能体列表 */
        .agent-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 14px 8px;
            margin-top: 2px;
        }
        .agent-list-header span {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--sidebar-heading);
        }
        .btn-add-agent {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1.5px dashed #555;
            background: transparent;
            color: #999;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .btn-add-agent:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(99, 102, 241, 0.08);
        }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin: 2px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            border: 1.5px solid transparent;
        }
        .agent-item:hover { background: var(--sidebar-hover); border-color: #3a3d45; }
        .agent-item.active { background: var(--sidebar-active); border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
        .agent-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2a2d35;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .agent-item.active .agent-avatar { background: #3a3d50; }
        .agent-info { flex: 1; min-width: 0; }
        .agent-name { font-weight: 600; font-size: 0.88rem; color: #e0e2e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .agent-preview { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
        .agent-actions { display: flex; gap: 2px; opacity: 0; transition: opacity var(--transition); }
        .agent-item:hover .agent-actions { opacity: 1; }
        .agent-actions button {
            width: 26px; height: 26px; border-radius: 50%; border: none; background: transparent; color: #888; cursor: pointer; font-size: 0.75rem;
            display: flex; align-items: center; justify-content: center; transition: all var(--transition);
        }
        .agent-actions button:hover { background: #3a3d48; color: #e0e2e8; }
        .agent-actions button.btn-delete:hover { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* ========== 聊天区 ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--chat-bg);
            min-width: 0;
            position: relative;
        }

        .chat-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: var(--chat-ai-bubble);
            border-bottom: 1px solid var(--chat-ai-border);
            flex-shrink: 0;
            gap: 12px;
            box-shadow: var(--shadow-sm);
            z-index: 5;
        }
        .current-agent-info { display: flex; align-items: center; gap: 10px; }
        .current-agent-avatar {
            width: 40px; height: 40px; border-radius: 50%; background: var(--accent-light);
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .current-agent-name { font-weight: 700; font-size: 1rem; color: var(--text-primary); }
        .current-agent-role { font-size: 0.72rem; color: var(--text-secondary); }

        .topbar-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .btn-topbar {
            display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: 20px;
            border: 1px solid var(--input-border); background: var(--input-bg); cursor: pointer;
            font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); transition: all var(--transition);
            white-space: nowrap; font-family: var(--font-sans);
        }
        .btn-topbar:hover { background: var(--chat-ai-border); border-color: #c5c9d4; color: var(--text-primary); }
        .btn-topbar:active { transform: scale(0.96); }
        .btn-topbar:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .btn-topbar.danger-hover:hover { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }

        /* 消息区域 */
        .messages-container {
            flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth;
        }
        .messages-container::-webkit-scrollbar { width: 5px; }
        .messages-container::-webkit-scrollbar-thumb { background: #d0d3dc; border-radius: 5px; }

        .message { display: flex; gap: 10px; max-width: 80%; animation: msgIn 0.3s ease-out; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .msg-avatar {
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0; margin-top: 2px;
        }
        .message.user .msg-avatar { background: #dde0f0; }
        .message.assistant .msg-avatar { background: #e8e9f0; }

        .msg-bubble {
            padding: 11px 16px; border-radius: var(--radius-lg); font-size: 0.9rem; line-height: 1.6;
            word-break: break-word; position: relative;
        }
        .message.user .msg-bubble { background: var(--chat-user-bubble); color: var(--chat-user-text); border-bottom-right-radius: 6px; }
        .message.assistant .msg-bubble { background: var(--chat-ai-bubble); color: var(--chat-ai-text); border: 1px solid var(--chat-ai-border); border-bottom-left-radius: 6px; box-shadow: var(--shadow-sm); }
        .msg-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 3px; padding: 0 4px; text-align: right; }
        .message.user .msg-time { text-align: left; }

        /* 消息操作按钮 */
        .msg-actions {
            display: flex; gap: 4px; margin-top: 4px; opacity: 0; transition: opacity var(--transition);
        }
        .message.assistant:hover .msg-actions { opacity: 1; }
        .btn-copy {
            font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--input-border);
            background: var(--input-bg); color: var(--text-secondary); cursor: pointer; transition: all var(--transition);
            font-family: var(--font-sans);
        }
        .btn-copy:hover { background: var(--chat-ai-border); color: var(--text-primary); }

        /* Markdown 样式 */
        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 10px 0 6px; font-weight: 600; }
        .msg-bubble h1 { font-size: 1.4rem; }
        .msg-bubble h2 { font-size: 1.2rem; }
        .msg-bubble h3 { font-size: 1rem; }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble ul, .msg-bubble ol { margin: 8px 0; padding-left: 20px; }
        .msg-bubble table { border-collapse: collapse; margin: 10px 0; width: 100%; }
        .msg-bubble th, .msg-bubble td { border: 1px solid var(--chat-ai-border); padding: 6px 10px; text-align: left; }
        .msg-bubble th { background: var(--chat-ai-border); }
        .msg-bubble pre { position: relative; }
        .msg-bubble pre code.hljs { padding: 14px; border-radius: 8px; font-size: 0.8rem; }

        /* 加载动画 */
        .loading-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
        .loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: #b0b5c8; animation: dotPulse 1.4s infinite ease-in-out; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

        .empty-chat {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); text-align: center; gap: 10px; padding: 40px;
        }
        .empty-chat .big-icon { font-size: 4rem; opacity: 0.5; margin-bottom: 8px; }
        .empty-chat h3 { font-weight: 600; color: var(--text-secondary); }
        .empty-chat p { font-size: 0.85rem; max-width: 360px; }

        /* 输入区 */
        .input-area {
            padding: 14px 20px 18px; background: var(--input-bg); border-top: 1px solid var(--input-border);
            flex-shrink: 0; display: flex; gap: 10px; align-items: flex-end;
        }
        .input-area textarea {
            flex: 1; padding: 11px 16px; border-radius: 24px; border: 1.5px solid var(--input-border);
            font-size: 0.88rem; font-family: var(--font-sans); resize: none; outline: none;
            transition: all var(--transition); max-height: 140px; min-height: 44px;
            background: var(--chat-bg); color: var(--text-primary);
        }
        .input-area textarea:focus { border-color: var(--input-focus-border); box-shadow: 0 0 0 4px rgba(99,102,241,0.08); }
        .btn-send {
            width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--accent); color: #fff;
            cursor: pointer; font-size: 1.1rem; transition: all var(--transition); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px var(--accent-glow);
        }
        .btn-send:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-send:disabled { background: #c5c8d8; cursor: not-allowed; box-shadow: none; transform: none; }

        /* 模态框 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px);
        }
        .modal {
            background: var(--chat-ai-bubble); border-radius: var(--radius-lg); padding: 24px 26px;
            width: 460px; max-width: 92vw; box-shadow: var(--shadow-lg);
        }
        .modal h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
        .modal .subtitle { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 16px; }
        .modal label { display: block; font-weight: 600; font-size: 0.8rem; margin-bottom: 4px; color: var(--text-secondary); }
        .modal input, .modal textarea {
            width: 100%; padding: 10px 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--input-border);
            font-size: 0.85rem; font-family: var(--font-sans); outline: none; transition: all var(--transition);
            margin-bottom: 12px; background: var(--input-bg); color: var(--text-primary);
        }
        .modal textarea { min-height: 80px; max-height: 200px; }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
        .modal .btn { padding: 9px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; font-size: 0.82rem; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-cancel { background: #f3f4f6; color: #555; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1a1d23; color: #fff; padding: 10px 22px; border-radius: 24px;
            font-size: 0.82rem; z-index: 200; box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s ease-out, toastOut 0.3s ease-out 2.2s forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(20px); } }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); width: 300px; min-width: 300px; z-index: 50; }
            .sidebar.open { transform: translateX(0); }
            .mobile-menu-btn { display: flex !important; }
            .message { max-width: 92%; }
        }
        .mobile-menu-btn {
            display: none; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--input-border);
            background: var(--input-bg); cursor: pointer; font-size: 1rem; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><div class="icon-wrapper">🤖</div><span>AI 聊天 Pro</span></div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换深色/浅色模式">🌙</button>
            </div>
            <div class="sidebar-scroll">
                <!-- API 配置 -->
                <div class="sidebar-section open" id="sectionApi">
                    <button class="section-toggle" onclick="toggleSection('sectionApi')">🔑 API 配置 <span class="arrow">▶</span></button>
                    <div class="section-content">
                        <label>DeepSeek API Key</label>
                        <input type="password" id="apiKeyInput" placeholder="sk-...">
                        <button class="btn-sm btn-accent-sm" onclick="saveApiKey()" style="margin-top:6px;width:100%;">💾 保存密钥</button>
                    </div>
                </div>
                <!-- 全局提示词 -->
                <div class="sidebar-section open" id="sectionGlobal">
                    <button class="section-toggle" onclick="toggleSection('sectionGlobal')">🌐 底层提示词 <span class="arrow">▶</span></button>
                    <div class="section-content">
                        <textarea id="globalPromptInput" placeholder="适用于所有智能体的底层提示词..."></textarea>
                        <button class="btn-sm btn-accent-sm" onclick="saveGlobalPrompt()" style="margin-top:6px;width:100%;">💾 保存全局提示词</button>
                    </div>
                </div>
                <!-- 模型参数 -->
                <div class="sidebar-section open" id="sectionParams">
                    <button class="section-toggle" onclick="toggleSection('sectionParams')">⚙️ 模型参数 <span class="arrow">▶</span></button>
                    <div class="section-content">
                        <label>Temperature (0-2)</label>
                        <input type="range" id="temperatureSlider" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('tempValue').textContent = this.value">
                        <span id="tempValue" style="color:var(--sidebar-text);font-size:0.8rem;">0.7</span>
                        <label style="margin-top:8px;">最大回复 Token</label>
                        <select id="maxTokensSelect">
                            <option value="1024">1024</option>
                            <option value="2048" selected>2048</option>
                            <option value="4096">4096</option>
                            <option value="8192">8192</option>
                        </select>
                    </div>
                </div>
                <!-- 智能体列表 -->
                <div class="agent-list-header"><span>🤖 我的智能体</span><button class="btn-add-agent" onclick="openCreateAgentModal()">+</button></div>
                <input type="text" class="agent-search" id="agentSearchInput" placeholder="搜索智能体..." oninput="filterAgents()">
                <div id="agentList"></div>
            </div>
        </aside>

        <!-- 聊天区 -->
        <main class="chat-area">
            <div class="chat-topbar">
                <div style="display:flex;align-items:center;gap:8px;">
                    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>
                    <div class="current-agent-info" id="currentAgentInfo">
                        <div class="current-agent-avatar">🤖</div>
                        <div><div class="current-agent-name">选择智能体</div><div class="current-agent-role">请在左侧选择或创建智能体</div></div>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="btn-topbar" onclick="exportChat()" title="导出对话为 Markdown">📥 导出</button>
                    <button class="btn-topbar" id="btnRegenerate" onclick="regenerate()" disabled>🔄 重新生成</button>
                    <button class="btn-topbar danger-hover" id="btnRestart" onclick="restartChat()" disabled>🗑️ 重启</button>
                    <button class="btn-topbar" id="btnUndo" onclick="undoMessage()" disabled>↩️ 撤回</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-chat" id="emptyChat">
                    <div class="big-icon">💬</div>
                    <h3>开始对话</h3>
                    <p>选择智能体，输入消息开始聊天。支持 Markdown 和代码高亮。</p>
                </div>
            </div>
            <div class="input-area">
                <textarea id="userInput" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" disabled></textarea>
                <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>➤</button>
            </div>
        </main>
    </div>

    <!-- 智能体编辑模态框 -->
    <div class="modal-overlay" id="agentModal" style="display:none;">
        <div class="modal">
            <h3 id="modalTitle">创建智能体</h3>
            <p class="subtitle" id="modalSubtitle">设置智能体的名称和人设提示词</p>
            <label>名称</label><input type="text" id="modalAgentName" placeholder="例如：翻译专家">
            <label>头像 Emoji</label><input type="text" id="modalAgentAvatar" placeholder="🤖" maxlength="4" style="width:70px;text-align:center;font-size:1.5rem;">
            <label>人设提示词</label><textarea id="modalAgentPrompt" placeholder="描述该智能体的人设..."></textarea>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="closeAgentModal()">取消</button>
                <button class="btn btn-primary" id="modalSaveBtn" onclick="saveAgent()">保存</button>
            </div>
        </div>
    </div>
    <div id="mobileOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:45;" onclick="closeMobileSidebar()"></div>

    <script>
        // 初始化 Marked 和 Highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            breaks: true,
            gfm: true
        });

        // ============ 数据管理 ============
        const STORAGE_KEY = 'ai_chat_platform_pro_v1';
        function getDefaultData() {
            return {
                apiKey: '', globalPrompt: '', theme: 'light',
                temperature: 0.7, maxTokens: 2048,
                agents: [{ id: 'agent_default', name: '通用助手', avatar: '🤖', personaPrompt: '你是一个乐于助人的AI助手。', createdAt: Date.now() }],
                chatHistories: { 'agent_default': [] },
                currentAgentId: 'agent_default'
            };
        }

        let appData = loadData();
        let editingAgentId = null, isLoading = false, abortController = null, currentStreamContent = '';

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    const def = getDefaultData();
                    for (const key of Object.keys(def)) if (!(key in data)) data[key] = def[key];
                    if (!data.agents || data.agents.length === 0) data.agents = def.agents;
                    if (!data.chatHistories) data.chatHistories = {};
                    data.agents.forEach(a => { if (!(a.id in data.chatHistories)) data.chatHistories[a.id] = []; });
                    return data;
                }
            } catch (e) {}
            return getDefaultData();
        }

        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

        // ============ DOM 引用 ============
        const $ = (s) => document.querySelector(s);
        const sidebar = $('#sidebar'), agentList = $('#agentList'), messagesContainer = $('#messagesContainer');
        const emptyChat = $('#emptyChat'), userInput = $('#userInput'), btnSend = $('#btnSend');
        const btnRegenerate = $('#btnRegenerate'), btnRestart = $('#btnRestart'), btnUndo = $('#btnUndo');
        const apiKeyInput = $('#apiKeyInput'), globalPromptInput = $('#globalPromptInput');
        const currentAgentInfo = $('#currentAgentInfo'), agentModal = $('#agentModal');
        const modalTitle = $('#modalTitle'), modalAgentName = $('#modalAgentName');
        const modalAgentAvatar = $('#modalAgentAvatar'), modalAgentPrompt = $('#modalAgentPrompt');
        const modalSaveBtn = $('#modalSaveBtn'), mobileOverlay = $('#mobileOverlay');
        const tempSlider = $('#temperatureSlider'), maxTokensSelect = $('#maxTokensSelect');
        const agentSearchInput = $('#agentSearchInput');

        // ============ 初始化 ============
        function init() {
            apiKeyInput.value = appData.apiKey || '';
            globalPromptInput.value = appData.globalPrompt || '';
            tempSlider.value = appData.temperature || 0.7;
            $('#tempValue').textContent = tempSlider.value;
            maxTokensSelect.value = appData.maxTokens || 2048;
            document.documentElement.setAttribute('data-theme', appData.theme || 'light');
            updateThemeIcon();
            renderAgentList();
            selectAgent(appData.currentAgentId, false);
            updateInputState();
        }

        // ============ 主题切换 ============
        window.toggleTheme = function() {
            appData.theme = appData.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', appData.theme);
            saveData();
            updateThemeIcon();
        };
        function updateThemeIcon() {
            const btn = $('#themeToggle');
            if (btn) btn.textContent = appData.theme === 'dark' ? '☀️' : '🌙';
        }

        // ============ 侧边栏折叠 ============
        window.toggleSection = (id) => document.getElementById(id)?.classList.toggle('open');

        // ============ API Key & 全局提示词 ============
        window.saveApiKey = () => { appData.apiKey = apiKeyInput.value.trim(); saveData(); updateInputState(); showToast('✅ 密钥已保存'); };
        window.saveGlobalPrompt = () => { appData.globalPrompt = globalPromptInput.value.trim(); saveData(); showToast('✅ 全局提示词已保存'); };

        // ============ 模型参数 ============
        tempSlider.addEventListener('change', () => { appData.temperature = parseFloat(tempSlider.value); saveData(); });
        maxTokensSelect.addEventListener('change', () => { appData.maxTokens = parseInt(maxTokensSelect.value); saveData(); });

        // ============ 智能体列表渲染 & 搜索 ============
        function renderAgentList(filterText = '') {
            agentList.innerHTML = '';
            const filtered = appData.agents.filter(a => a.name.toLowerCase().includes(filterText.toLowerCase()));
            filtered.forEach(agent => {
                const isActive = agent.id === appData.currentAgentId;
                const div = document.createElement('div');
                div.className = 'agent-item' + (isActive ? ' active' : '');
                div.innerHTML = `
                    <div class="agent-avatar">${escapeHtml(agent.avatar||'🤖')}</div>
                    <div class="agent-info">
                        <div class="agent-name">${escapeHtml(agent.name)}</div>
                        <div class="agent-preview">${escapeHtml(agent.personaPrompt||'无描述')}</div>
                    </div>
                    <div class="agent-actions">
                        <button onclick="event.stopPropagation();openEditAgentModal('${agent.id}')">✎</button>
                        <button class="btn-delete" onclick="event.stopPropagation();deleteAgent('${agent.id}')">×</button>
                    </div>`;
                div.addEventListener('click', () => selectAgent(agent.id, true));
                agentList.appendChild(div);
            });
        }
        window.filterAgents = () => renderAgentList(agentSearchInput.value);

        function selectAgent(agentId, saveFlag) {
            if (isLoading && appData.currentAgentId !== agentId) { abortController?.abort(); isLoading = false; }
            appData.currentAgentId = agentId;
            if (saveFlag !== false) saveData();
            renderAgentList(agentSearchInput.value);
            renderMessages();
            updateTopbarInfo();
            updateTopbarButtons();
            updateInputState();
            scrollToBottom();
        }

        function getCurrentAgent() { return appData.agents.find(a => a.id === appData.currentAgentId); }
        function getCurrentHistory() {
            if (!(appData.currentAgentId in appData.chatHistories)) appData.chatHistories[appData.currentAgentId] = [];
            return appData.chatHistories[appData.currentAgentId];
        }

        function updateTopbarInfo() {
            const agent = getCurrentAgent();
            if (agent) {
                currentAgentInfo.innerHTML = `<div class="current-agent-avatar">${escapeHtml(agent.avatar||'🤖')}</div><div><div class="current-agent-name">${escapeHtml(agent.name)}</div><div class="current-agent-role">${escapeHtml(agent.personaPrompt||'智能体人设')}</div></div>`;
            }
        }

        function updateTopbarButtons() {
            const history = getCurrentHistory();
            const has = history.length > 0;
            btnRegenerate.disabled = !has || isLoading;
            btnRestart.disabled = !has || isLoading;
            btnUndo.disabled = !has || isLoading;
        }

        function updateInputState() {
            const hasKey = !!appData.apiKey, hasAgent = !!getCurrentAgent();
            userInput.disabled = !hasKey || !hasAgent || isLoading;
            btnSend.disabled = !hasKey || !hasAgent || isLoading || !userInput.value.trim();
            userInput.placeholder = !hasKey ? '请先配置API密钥...' : (!hasAgent ? '请先选择智能体...' : (isLoading ? 'AI 正在回复...' : '输入消息...'));
        }

        // ============ 消息渲染（Markdown + 代码高亮） ============
        function renderMessages() {
            const history = getCurrentHistory();
            messagesContainer.innerHTML = '';
            if (history.length === 0) {
                emptyChat.style.display = 'flex';
                messagesContainer.appendChild(emptyChat);
            } else {
                emptyChat.style.display = 'none';
                history.forEach((msg, idx) => messagesContainer.appendChild(createMessageElement(msg, idx)));
            }
        }

        function createMessageElement(msg, index) {
            const div = document.createElement('div');
            div.className = 'message ' + msg.role;
            const agent = getCurrentAgent();
            const avatar = msg.role === 'user' ? '👤' : (agent?.avatar || '🤖');
            const contentHtml = msg.role === 'assistant' ? marked.parse(msg.content) : escapeHtml(msg.content).replace(/\n/g, '<br>');
            div.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div style="max-width:100%;">
                    <div class="msg-bubble">${contentHtml}</div>
                    ${msg.role === 'assistant' ? `
                    <div class="msg-actions">
                        <button class="btn-copy" onclick="copyMessage(this)">📋 复制</button>
                    </div>` : ''}
                    <div class="msg-time">${msg.timestamp ? formatTime(msg.timestamp) : ''}</div>
                </div>`;
            // 高亮代码块
            div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
            return div;
        }

        window.copyMessage = function(btn) {
            const bubble = btn.closest('.message').querySelector('.msg-bubble');
            const text = bubble.textContent.trim();
            navigator.clipboard.writeText(text).then(() => showToast('📋 已复制到剪贴板'));
        };

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatTime(ts) {
            const d = new Date(ts), now = new Date();
            const hm = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            if (d.toDateString() === now.toDateString()) return hm;
            return `${d.getMonth()+1}/${d.getDate()} ${hm}`;
        }

        function scrollToBottom() { requestAnimationFrame(() => messagesContainer.scrollTop = messagesContainer.scrollHeight); }

        // ============ 流式调用 DeepSeek API ============
        async function callDeepSeekAPI() {
            const history = getCurrentHistory();
            const agent = getCurrentAgent();
            if (!agent) return;
            isLoading = true; updateInputState(); updateTopbarButtons();

            // 添加加载占位
            const loadingEl = document.createElement('div');
            loadingEl.className = 'message assistant';
            loadingEl.id = 'streamingMessage';
            loadingEl.innerHTML = `<div class="msg-avatar">${escapeHtml(agent.avatar||'🤖')}</div><div class="msg-bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
            emptyChat.style.display = 'none';
            messagesContainer.appendChild(loadingEl);
            scrollToBottom();

            const systemParts = [appData.globalPrompt?.trim(), agent.personaPrompt?.trim()].filter(Boolean);
            const systemMessage = systemParts.join('\n\n') || 'You are a helpful assistant.';
            const messages = [
                { role: 'system', content: systemMessage },
                ...history.map(m => ({ role: m.role, content: m.content }))
            ];

            abortController = new AbortController();
            currentStreamContent = '';

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${appData.apiKey}` },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages,
                        temperature: appData.temperature || 0.7,
                        max_tokens: appData.maxTokens || 2048,
                        stream: true
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                const bubble = loadingEl.querySelector('.msg-bubble');
                bubble.innerHTML = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.startsWith('data: '));
                    for (const line of lines) {
                        const jsonStr = line.replace('data: ', '').trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(jsonStr);
                            const delta = parsed.choices?.[0]?.delta?.content;
                            if (delta) {
                                currentStreamContent += delta;
                                bubble.innerHTML = marked.parse(currentStreamContent);
                                bubble.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }

                // 流结束，保存完整消息
                history.push({ role: 'assistant', content: currentStreamContent, timestamp: Date.now() });
                saveData();
                loadingEl.removeAttribute('id');
                // 添加复制按钮
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'msg-actions';
                actionsDiv.innerHTML = '<button class="btn-copy" onclick="copyMessage(this)">📋 复制</button>';
                loadingEl.querySelector('div:last-child').appendChild(actionsDiv);

            } catch (err) {
                if (loadingEl.parentNode) loadingEl.remove();
                if (err.name !== 'AbortError') {
                    const errMsg = `❌ 请求失败\n\n${err.message}`;
                    history.push({ role: 'assistant', content: errMsg, timestamp: Date.now() });
                    saveData();
                    renderMessages();
                    showToast('⚠️ ' + err.message);
                }
            } finally {
                isLoading = false; abortController = null;
                updateInputState(); updateTopbarButtons();
                if (loadingEl.parentNode && loadingEl.id === 'streamingMessage') loadingEl.remove();
            }
        }

        // ============ 发送 / 重新生成 / 撤回 / 重启 ============
        window.sendMessage = async function() {
            if (isLoading) return;
            const content = userInput.value.trim();
            if (!content || !appData.apiKey || !getCurrentAgent()) return;
            getCurrentHistory().push({ role: 'user', content, timestamp: Date.now() });
            userInput.value = ''; userInput.style.height = 'auto';
            updateInputState(); renderMessages(); scrollToBottom();
            await callDeepSeekAPI();
        };

        window.regenerate = async function() {
            if (isLoading) return;
            const history = getCurrentHistory();
            if (history.length === 0) return;
            if (history[history.length-1].role === 'assistant') history.pop();
            saveData(); renderMessages(); updateTopbarButtons(); scrollToBottom();
            if (history.length > 0 && history[history.length-1].role === 'user') await callDeepSeekAPI();
        };

        window.undoMessage = function() {
            if (isLoading) return;
            const history = getCurrentHistory();
            if (history.length === 0) return;
            if (history[history.length-1].role === 'assistant') history.pop();
            if (history.length > 0 && history[history.length-1].role === 'user') history.pop();
            saveData(); renderMessages(); updateTopbarButtons(); scrollToBottom();
            showToast('↩️ 已撤回');
        };

        window.restartChat = function() {
            if (isLoading || getCurrentHistory().length === 0) return;
            if (!confirm('确定要清空当前对话吗？')) return;
            appData.chatHistories[appData.currentAgentId] = [];
            saveData(); renderMessages(); updateTopbarButtons(); updateInputState();
            showToast('🗑️ 对话已重启');
        };

        // ============ 导出对话 ============
        window.exportChat = function() {
            const history = getCurrentHistory();
            if (history.length === 0) { showToast('没有对话可导出'); return; }
            const agent = getCurrentAgent();
            let md = `# 与 ${agent?.name || '智能体'} 的对话\n\n`;
            history.forEach(msg => {
                const role = msg.role === 'user' ? '🧑 你' : `🤖 ${agent?.name || 'AI'}`;
                md += `**${role}** (${msg.timestamp ? new Date(msg.timestamp).toLocaleString() : ''})\n\n${msg.content}\n\n---\n\n`;
            });
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `chat_${agent?.name||'export'}_${new Date().toISOString().slice(0,10)}.md`;
            a.click(); URL.revokeObjectURL(url);
            showToast('📥 对话已导出');
        };

        // ============ 智能体 CRUD ============
        window.openCreateAgentModal = () => {
            editingAgentId = null;
            modalTitle.textContent = '创建智能体'; modalAgentName.value = ''; modalAgentAvatar.value = '🤖'; modalAgentPrompt.value = '';
            agentModal.style.display = 'flex';
        };
        window.openEditAgentModal = (id) => {
            const agent = appData.agents.find(a => a.id === id); if (!agent) return;
            editingAgentId = id; modalTitle.textContent = '编辑智能体';
            modalAgentName.value = agent.name; modalAgentAvatar.value = agent.avatar; modalAgentPrompt.value = agent.personaPrompt;
            agentModal.style.display = 'flex';
        };
        window.closeAgentModal = () => { agentModal.style.display = 'none'; editingAgentId = null; };
        window.saveAgent = function() {
            const name = modalAgentName.value.trim(), avatar = modalAgentAvatar.value.trim() || '🤖', prompt = modalAgentPrompt.value.trim();
            if (!name) return showToast('⚠️ 请输入名称');
            if (editingAgentId) {
                const agent = appData.agents.find(a => a.id === editingAgentId);
                if (agent) { agent.name = name; agent.avatar = avatar; agent.personaPrompt = prompt; }
            } else {
                const newAgent = { id: 'agent_' + Date.now(), name, avatar, personaPrompt: prompt, createdAt: Date.now() };
                appData.agents.push(newAgent);
                appData.chatHistories[newAgent.id] = [];
                appData.currentAgentId = newAgent.id;
            }
            saveData(); renderAgentList(); selectAgent(appData.currentAgentId, false);
            updateTopbarInfo(); updateInputState(); agentModal.style.display = 'none';
        };
        window.deleteAgent = function(id) {
            if (appData.agents.length <= 1) return showToast('至少保留一个智能体');
            if (!confirm('确定删除该智能体及其所有对话？')) return;
            appData.agents = appData.agents.filter(a => a.id !== id);
            delete appData.chatHistories[id];
            if (appData.currentAgentId === id) appData.currentAgentId = appData.agents[0].id;
            saveData(); renderAgentList(); selectAgent(appData.currentAgentId, false);
        };

        // ============ 移动端侧边栏 ============
        window.toggleMobileSidebar = () => {
            sidebar.classList.toggle('open');
            mobileOverlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        };
        window.closeMobileSidebar = () => { sidebar.classList.remove('open'); mobileOverlay.style.display = 'none'; };

        // ============ 键盘快捷键 ============
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!btnSend.disabled) sendMessage(); }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (agentModal.style.display === 'flex') closeAgentModal();
                else if (sidebar.classList.contains('open')) closeMobileSidebar();
            }
        });

        function showToast(msg) {
            const existing = document.querySelector('.toast'); if (existing) existing.remove();
            const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2600);
        }

        // 自动调整输入框高度
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto'; userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
            updateInputState();
        });

        // 监听参数变化
        tempSlider.addEventListener('input', () => $('#tempValue').textContent = tempSlider.value);

        // 启动
        init();
    </script>
</body>
</html>
